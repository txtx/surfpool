name: Publish Rust Crates

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and index
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-publish-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-publish-${{ runner.os }}-

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_API_TOKEN }}
        run: |
          CRATES="surfpool-types surfpool-db surfpool-subgraph surfpool-gql surfpool-core surfpool-studio-ui"

          for CRATE in $CRATES; do
            VERSION=$(cargo metadata --format-version=1 --no-deps \
              | jq -r --arg name "$CRATE" '.packages[] | select(.name == $name) | .version')

            if [ -z "$VERSION" ]; then
              echo "::warning::Could not find version for $CRATE, skipping"
              continue
            fi

            PUBLISHED=$(cargo search "$CRATE" --limit 1 2>/dev/null \
              | grep "^${CRATE} " | sed 's/.*"\(.*\)".*/\1/' || true)

            if [ "$PUBLISHED" = "$VERSION" ]; then
              echo "$CRATE@$VERSION is already published, skipping"
              continue
            fi

            echo "Publishing $CRATE@$VERSION..."
            cargo publish --package "$CRATE"
            sleep 15
          done
