name: Surfpool Test Report
description: >
  Generate a Surfpool test report from SURFPOOL_REPORT data and publish it
  to GitHub Pages. Posts a clickable link as a sticky PR comment.

inputs:
  report-dir:
    description: Directory containing surfpool report JSON files
    default: target/surfpool-reports
  output-path:
    description: Path for the generated HTML report
    default: target/surfpool-report.html
  generate-command:
    description: Command to generate the HTML report from JSON data (if needed)
    required: false
  pages-path:
    description: Path prefix on GitHub Pages (e.g. "pr/1")
    default: pr/${{ github.event.pull_request.number }}
  comment-header:
    description: Sticky comment header ID
    default: surfpool-report

runs:
  using: composite
  steps:
    - name: Generate report
      if: inputs.generate-command != ''
      shell: bash
      run: ${{ inputs.generate-command }}

    - name: Upload report artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: surfpool-test-report
        path: ${{ inputs.output-path }}

    - name: Deploy to GitHub Pages
      if: always() && github.event_name == 'pull_request'
      shell: bash
      env:
        REPORT_FILE: ${{ inputs.output-path }}
        PAGES_PATH: ${{ inputs.pages-path }}
      run: |
        if [ ! -f "${REPORT_FILE}" ]; then
          echo "No report file found, skipping deploy"
          exit 0
        fi

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        cp "${REPORT_FILE}" /tmp/surfpool-report.html

        if git ls-remote --exit-code origin gh-pages >/dev/null 2>&1; then
          git fetch origin gh-pages
          git checkout gh-pages
        else
          git checkout --orphan gh-pages
          git rm -rf . 2>/dev/null || true
          echo "# GitHub Pages" > README.md
          git add README.md
          git commit -m "init: gh-pages branch"
        fi

        mkdir -p "${PAGES_PATH}"
        cp /tmp/surfpool-report.html "${PAGES_PATH}/index.html"

        git add "${PAGES_PATH}/index.html"
        git commit -m "deploy: surfpool report for ${PAGES_PATH}" || true
        git push origin gh-pages

        git checkout -

    - name: Comment PR
      if: always() && github.event_name == 'pull_request'
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        header: ${{ inputs.comment-header }}
        message: |
          ## [Surfpool Test Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ inputs.pages-path }}/)

          View the full transaction report with instruction profiling, account state diffs, and byte comparison.
