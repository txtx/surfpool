templates:
  - id: pyth-price-feed-v2
    name: Override Price Feed
    description: Override any Pyth price feed with custom price data
    idl_account_name: PriceUpdateV2
    properties:
      - path: price_message.price
        label: Price
        description: The price value
      - path: feed_id
        type: constant_ref
        label: Price Feed
        constant: price_feed
    llm_context: |
      CRITICAL: Always set fetchBeforeUse: true for Pyth price feeds!
      This fetches the current account data from mainnet before applying your price override.

      HOW TO USE THIS TEMPLATE:
      1. Select the correct price feed from the `feed_id` constant options (e.g., SOL/USD, BTC/USD)
      2. Check the feed's `llm_context` field for its decimal precision (most use 8, some use 10)
      3. Calculate price_message.price = usd_price * 10^decimals

      PRICE CALCULATION:
      - For 8 decimal feeds (SOL, BTC, ETH, etc.): multiply USD price by 100,000,000
        $145.00 SOL → 14500000000
        $97,000 BTC → 9700000000000
        $3,500 ETH  → 350000000000
      - For 10 decimal feeds (BONK, PEPE, SHIB): multiply USD price by 10,000,000,000
        $0.00002 BONK → 200000
        $0.000012 PEPE → 120000

      EXAMPLE SCENARIO - "SOL crashes from $145 to $85":
      Override 1 (slot 0): feed_id=SOL/USD, price_message.price=14500000000
      Override 2 (slot 1): feed_id=SOL/USD, price_message.price=8500000000
    address:
      type: pda
      program_id: pythWSnswVUd12oZpeFP8e9CVaEqJg25g1Vtc2biRsT
      seeds:
        - type: u16_le
          value: 0
        - type: bytes32_ref
          value: feed_id
