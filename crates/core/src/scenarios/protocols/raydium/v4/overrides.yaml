templates:
  - id: raydium-amm-pool-state
    name: Override AMM Pool State
    description: Override Raydium AMM v4 pool state including status and configuration
    idl_account_name: AmmInfo
    properties: ["status", "state", "lp_amount"]
    address:
      type: pubkey

  - id: raydium-amm-fees
    name: Override AMM Fees
    description: Override Raydium AMM v4 fee configuration for swap simulations
    idl_account_name: AmmInfo
    properties:
      [
        "fees.swap_fee_numerator",
        "fees.swap_fee_denominator",
        "fees.trade_fee_numerator",
        "fees.trade_fee_denominator",
      ]
    address:
      type: pubkey

  - id: raydium-amm-swap-stats
    name: Override AMM Swap Statistics
    description: Override Raydium AMM v4 swap statistics and cumulative amounts
    idl_account_name: AmmInfo
    properties:
      [
        "out_put.swap_coin_in_amount",
        "out_put.swap_pc_out_amount",
        "out_put.swap_pc_in_amount",
        "out_put.swap_coin_out_amount",
        "out_put.pool_open_time",
      ]
    address:
      type: pubkey

  - id: raydium-amm-custom
    name: Override Custom AMM Pool
    description: |
      Override any Raydium AMM v4 pool by specifying the OpenBook market address.
      AMM v4 pools are integrated with OpenBook orderbook, so the pool PDA is derived from the market address.
      PDA seeds: [program_id, openbook_market, "amm_associated_seed"]
    idl_account_name: AmmInfo
    properties:
      - path: status
        label: Pool Status
        description: Pool operational status
      - path: state
        label: Pool State
        description: Pool state flags
      - path: lp_amount
        label: LP Amount
        description: Total LP tokens in circulation
      - path: fees.swap_fee_numerator
        label: Swap Fee Numerator
        description: Swap fee numerator for fee calculation
      - path: fees.swap_fee_denominator
        label: Swap Fee Denominator
        description: Swap fee denominator for fee calculation
      - path: out_put.pool_open_time
        label: Pool Open Time
        description: Unix timestamp when pool opened
      - path: market
        type: constant_ref
        label: OpenBook Market
        constant: openbook_market
    llm_context: |
      CRITICAL: Always set fetchBeforeUse: true for Raydium AMM v4 pools!
      This fetches the current account data from mainnet before applying your overrides.

      HOW TO USE THIS TEMPLATE:
      1. Select the correct OpenBook market from the `market` constant options
      2. The pool PDA is automatically derived from: [program_id, market, "amm_associated_seed"]
      3. Override any pool fields you need (status, fees, etc.)

      UNDERSTANDING AMM v4 POOLS:
      - Raydium AMM v4 is integrated with OpenBook orderbook
      - The pool address is a PDA derived from the OpenBook market address
      - Each pool has token vaults for both coins (coin = base token, pc = quote token)

      TO SIMULATE PRICE CHANGES:
      - Don't modify AmmInfo directly for price simulation
      - Instead, use the spl-token-account-balance template to modify vault balances
      - Price = pc_vault_balance / coin_vault_balance (adjusted for decimals)

      EXAMPLE - Override SOL/USDC pool to change fees:
      market: select "SOL/USDC" from options
      fees.swap_fee_numerator: 25 (0.25% fee = 25/10000)
      fees.swap_fee_denominator: 10000
    address:
      type: pda
      program_id: 675kPX9MHTjS2zt1qfr1NYHuzeLXfQM9H24wFSUt1Mp8
      seeds:
        - type: pubkey
          value: 675kPX9MHTjS2zt1qfr1NYHuzeLXfQM9H24wFSUt1Mp8
        - type: property_ref
          value: market
        - type: string
          value: amm_associated_seed
